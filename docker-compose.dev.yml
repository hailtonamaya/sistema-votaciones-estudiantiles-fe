services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: votaciones-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    restart: unless-stopped

volumes:
  frontend_node_modules: